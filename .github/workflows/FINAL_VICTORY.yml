name: PUSH_SUITCASE_TO_CODE
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Gather All Missing Screws
        run: |
          mkdir -p suitcase
          # This grabs everything EXCEPT the giant torch files you already have
          pip download stable-audio-tools --platform win_amd64 --python-version 310 --only-binary=:all: --dest ./suitcase
          rm -f suitcase/torch* suitcase/nvidia*
          zip -r full_package.zip suitcase/
          mkdir -p code_suitcase
          split -b 50M full_package.zip "code_suitcase/parts.zip."
      - name: Push to Code Tab
        run: |
          git config --global user.name "robot"
          git config --global user.email "robot@github.com"
          git add code_suitcase/*
          git commit -m "Car parts are here"
          git push origin master
