name: Final Victory Release
on: workflow_dispatch
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Everything for Windows
        run: |
          mkdir -p suitcase
          pip download stable-audio-tools --platform win_amd64 --python-version 310 --only-binary=:all: --dest ./suitcase
          zip -r final_package.zip suitcase/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: final_package.zip
          tag_name: v${{ github.run_number }}
          name: Final Suitcase for Iran
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
