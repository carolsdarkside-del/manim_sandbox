name: PUSH_PARTS_TO_CODE
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Gather Everything
        run: |
          mkdir -p temp_suitcase
          pip download stable-audio-tools --platform win_amd64 --python-version 310 --only-binary=:all: --dest ./temp_suitcase
          zip -r car_parts.zip temp_suitcase/
          mkdir -p car_parts_folder
          split -b 50M car_parts.zip "car_parts_folder/parts.zip."
      - name: Push to Code Tab
        run: |
          git config --global user.name "robot"
          git config --global user.email "robot@github.com"
          git add car_parts_folder/*
          git commit -m "The whole car is here"
          git push origin master
