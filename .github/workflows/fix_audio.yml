name: Gather All Windows Parts
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download Everything
        run: |
          mkdir suitcase
          pip download stable-audio-tools torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu121 --extra-index-url https://pypi.org/simple --dest ./suitcase

      - name: Upload Suitcase
        uses: actions/upload-artifact@v4
        with:
          name: all_dependencies_for_iran
          path: suitcase/
