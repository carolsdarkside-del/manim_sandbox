name: TELEGRAM_SPLIT_FIXED
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download Everything
        run: |
          mkdir suitcase
          # This command is now forced to ignore errors and grab everything possible
          pip download stable-audio-tools --platform win_amd64 --python-version 310 --only-binary=:all: --dest ./suitcase || true
          rm -f suitcase/torch* suitcase/nvidia* suitcase/triton*
      - name: Zip and Split
        run: |
          zip -r -j transport.zip suitcase/
          mkdir final_parts
          split -b 45M transport.zip "final_parts/part_"
      - name: Send to Telegram
        run: |
          for file in final_parts/*; do
            curl -v -F document=@"$file" "https://api.telegram.org/bot<YOUR_TOKEN>/sendDocument?chat_id=<YOUR_ID>"
            sleep 5
          done
